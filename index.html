<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML5 Boilerplate</title>
    <meta name="description" content="A minimal HTML5 boilerplate" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1>HTML5 Boilerplate</h1>
    </header>
    <main>
      <div class="content"></div>
      <input type="checkbox" name="interest" value="กีฬา" />กีฬา
      <input type="checkbox" name="interest" value="ดนตรี" />ดนตรี
      <input type="checkbox" name="interest" value="ท่องเที่ยว" />ท่องเที่ยว
      <input type="checkbox" name="interest" value="อ่านหนังสือ" />อ่านหนังสือ
      <input type="checkbox" name="interest" value="เล่นเกม" />เล่นเกม
      <button id="submitBtn" onclick="submitInterests()">Submit</button>
    </main>
    <script type="module" src="js/main.js" defer></script>
    <script>
      function submitInterests() {
        let interestsDom = document.querySelectorAll("input[name=interest]");
        let contentHTML = "<ul>";
        for (let i = 0; i < interestsDom.length; i++) {
          if (interestsDom[i].checked) {
            contentHTML += "<li>" + interestsDom[i].value + "</li>";
            console.log(interestsDom[i].value);
          }
        }
        contentHTML += "</ul>";
        let contentDom = document.querySelector(".content");
        contentDom.innerHTML = contentHTML;
        console.log(contentHTML);
      }
    </script>
  </body>
</html>
