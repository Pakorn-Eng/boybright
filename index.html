<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML5 Boilerplate</title>
    <meta name="description" content="A minimal HTML5 boilerplate" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1>HTML5 Boilerplate</h1>
    </header>
    <main>
      <a id="thislink" href="https://www.google.com" target="_blank">Google</a>
      <div id="thisdiv">This is a div</div>
      <input type="text" id="thisinput" value="Hello World" />
      <button onclick="handleClick()" id="thisbutton">Click Me</button>
    </main>
    <script type="module" src="js/main.js" defer></script>
    <script>
      let thislinkDOM = document.getElementById("thislink");
      let thisinputDOM = document.getElementById("thisinput");
      let thisbuttonDOM = document.getElementById("thisbutton");
      let thisdivDOM = document.getElementById("thisdiv");
      let handleClick = () => {
        console.log("Button clicked!");
        console.log(thisinputDOM.value);
        thisdivDOM.innerHTML = thisinputDOM.value;
      };
      console.log(thislinkDOM.getAttribute("href"));
    </script>
  </body>
</html>
